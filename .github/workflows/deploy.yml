name: CI/CD Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: romarich57
  # Noms d’images STABLES et lowercase (indépendants du nom du repo)
  BACKEND_IMAGE: ghcr.io/romarich57/saas-builder-backend
  FRONTEND_IMAGE: ghcr.io/romarich57/saas-builder-frontend
  ADMIN_IMAGE: ghcr.io/romarich57/saas-builder-admin

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/saas_builder_test
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5434:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_builder_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # -------- BACKEND --------
      - name: Backend deps
        working-directory: apps/backend
        run: npm ci

      - name: Backend Prisma validate
        working-directory: apps/backend
        run: npx prisma validate

      - name: Backend lint
        working-directory: apps/backend
        run: npm run lint

      - name: Backend typecheck
        working-directory: apps/backend
        run: npm run typecheck

      - name: Backend tests
        working-directory: apps/backend
        run: npm test

      # -------- FRONTEND --------
      - name: Frontend deps
        working-directory: apps/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: apps/frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: apps/frontend
        run: npm run test

      - name: Frontend build
        working-directory: apps/frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL }}
        run: npm run build

      # -------- ADMIN --------
      - name: Admin deps
        working-directory: frontends_admin
        run: npm ci --legacy-peer-deps

      - name: Admin lint
        working-directory: frontends_admin
        run: npm run lint

      - name: Admin tests
        working-directory: frontends_admin
        run: npm run test

      - name: Admin build
        working-directory: frontends_admin
        env:
          VITE_ADMIN_API_BASE_URL: ${{ vars.VITE_ADMIN_API_BASE_URL }}
          VITE_MAIN_APP_URL: ${{ vars.VITE_MAIN_APP_URL }}
        run: npm run build

  build_and_push:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      # Login GHCR avec le token GitHub natif (plus simple)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_APP_BASE_URL=${{ vars.VITE_APP_BASE_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build & push admin
        uses: docker/build-push-action@v6
        with:
          context: ./frontends_admin
          file: ./frontends_admin/Dockerfile.prod
          push: true
          build-args: |
            VITE_ADMIN_API_BASE_URL=${{ vars.VITE_ADMIN_API_BASE_URL }}
            VITE_MAIN_APP_URL=${{ vars.VITE_MAIN_APP_URL }}
          tags: |
            ${{ env.ADMIN_IMAGE }}:latest
            ${{ env.ADMIN_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/saas-builder

            # Login GHCR SUR VPS
            # => Utilise un token "deploy" dédié stocké en secret (lecture packages).
            docker login ghcr.io -u romarich57 -p ${{ secrets.GHCR_DEPLOY_TOKEN }}

            docker compose --env-file ./apps/backend/.env.prod -f docker-compose.prod.yml pull
            docker compose --env-file ./apps/backend/.env.prod -f docker-compose.prod.yml up -d

            sleep 8

            # Healthcheck - adapte selon ton backend:
            # Option 1 (recommandée): /health
            curl -f https://api-builder.romdev.cloud/health

            # Option 2 si ton backend expose /api/health :
            # curl -f https://api-builder.romdev.cloud/api/health