# Docker Compose for Development with HTTPS
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    profiles: [ "dev", "prodlike" ]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_builder
    ports:
      - "5434:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-dev-net

  # Redis (rate limit store)
  redis:
    image: redis:7.4.1-alpine
    profiles: [ "dev", "prodlike" ]
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning" ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-dev-net

  # MinIO S3-compatible storage
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    profiles: [ "dev", "prodlike" ]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9000/minio/health/live || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-dev-net

  # MinIO bucket initialization
  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    profiles: [ "dev", "prodlike" ]
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c " until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done; mc mb -p local/app-dev || true; mc anonymous set none local/app-dev || true; exit 0; "
    networks:
      - saas-dev-net

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    profiles: [ "dev" ]
    environment:
      NODE_ENV: development
      PORT: 4100
      DATABASE_URL: postgresql://postgres:postgres@db:5432/saas_builder?schema=public
      CORS_ORIGINS: ${DEV_CORS_ORIGINS:-https://localhost:3000,https://localhost:3002,http://localhost:3000,http://localhost:3002}
      APP_BASE_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
      APP_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
      OAUTH_REDIRECT_BASE_URL: ${DEV_OAUTH_REDIRECT_BASE_URL:-https://localhost:4000}
      TRUST_PROXY: "1"
      HTTPS_ENABLED: ${DEV_TLS_ENABLED:-true}
      HTTPS_CERT_PATH: /app/certs/localhost.crt
      HTTPS_KEY_PATH: /app/certs/localhost.key
      LOG_LEVEL: info
      TWILIO_VERIFY_MODE: ${TWILIO_VERIFY_MODE:-mock}
      # Secrets (override in .env or docker-compose.override.yml)
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev_access_secret_change_me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_me}
      MFA_CHALLENGE_SECRET: ${MFA_CHALLENGE_SECRET:-dev_mfa_secret_change_me}
      TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:-dev_token_hash_change_me}
      BACKUP_CODE_PEPPER: ${BACKUP_CODE_PEPPER:-dev_backup_pepper_change_me}
      COOKIE_SIGNING_SECRET: ${COOKIE_SIGNING_SECRET:-dev_cookie_secret_change_me}
      MFA_MASTER_KEY: ${MFA_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      REDIS_URL: redis://redis:6379
      # S3 (MinIO)
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: app-dev
      S3_FORCE_PATH_STYLE: "true"
      S3_USE_SSL: "false"
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_TAX_ENABLED: ${STRIPE_TAX_ENABLED:-true}
      STRIPE_CUSTOMER_PORTAL_CONFIGURATION_ID: ${STRIPE_CUSTOMER_PORTAL_CONFIGURATION_ID:-}
      STRIPE_PRICE_ID_PREMIUM: ${STRIPE_PRICE_ID_PREMIUM:-}
      STRIPE_PRICE_ID_VIP: ${STRIPE_PRICE_ID_VIP:-}
      STRIPE_PRODUCT_ID_PREMIUM: ${STRIPE_PRODUCT_ID_PREMIUM:-}
      STRIPE_PRODUCT_ID_VIP: ${STRIPE_PRODUCT_ID_VIP:-}
    ports:
      - "4100:4100"
    volumes:
      - ./apps/backend/src:/app/src:ro
      - ./apps/backend/prisma:/app/prisma:ro
      - ./apps/backend/tests:/app/tests:ro
      - ./ops/certs:/app/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider --no-check-certificate ${BACKEND_HEALTH_URL:-https://localhost:4100/health} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-dev-net

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    profiles: [ "dev" ]
    environment:
      VITE_API_BASE_URL: ${DEV_API_BASE_URL:-https://localhost:4000}
      VITE_APP_BASE_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
    volumes:
      - ./apps/frontend/src:/app/src:ro
      - ./apps/frontend/index.html:/app/index.html:ro
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:5173" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-dev-net

  # Admin Frontend (Vite dev server)
  frontend_admin:
    build:
      context: ./frontends_admin
      dockerfile: Dockerfile.dev
    profiles: [ "dev" ]
    environment:
      VITE_ADMIN_API_BASE_URL: ${DEV_API_BASE_URL:-https://localhost:4000}
      VITE_MAIN_APP_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
    volumes:
      - ./frontends_admin/src:/app/src:ro
      - ./frontends_admin/index.html:/app/index.html:ro
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:5174" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-dev-net

  # Nginx reverse proxy with SSL
  nginx:
    build:
      context: ./ops/nginx
      dockerfile: Dockerfile
    profiles: [ "dev" ]
    ports:
      - "${DEV_WEB_PORT:-3000}:3000"
      - "${DEV_ADMIN_PORT:-3002}:3002"
      - "${DEV_API_PORT:-4000}:4000"
    volumes:
      - ${NGINX_DEV_CONF:-./ops/nginx/dev_https.conf}:/etc/nginx/nginx.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      frontend_admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - saas-dev-net

  # -------- PROD-LIKE PROFILE --------
  backend_prod:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.prod
    profiles: [ "prodlike" ]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/saas_builder?schema=public
      CORS_ORIGINS: ${DEV_CORS_ORIGINS:-https://localhost:3000,https://localhost:3002,http://localhost:3000,http://localhost:3002}
      APP_BASE_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
      APP_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
      OAUTH_REDIRECT_BASE_URL: ${DEV_OAUTH_REDIRECT_BASE_URL:-https://localhost:4000}
      TRUST_PROXY: "1"
      HTTPS_ENABLED: "false"
      LOG_LEVEL: info
      TWILIO_VERIFY_MODE: ${TWILIO_VERIFY_MODE:-mock}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev_access_secret_change_me}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_me}
      MFA_CHALLENGE_SECRET: ${MFA_CHALLENGE_SECRET:-dev_mfa_secret_change_me}
      TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:-dev_token_hash_change_me}
      BACKUP_CODE_PEPPER: ${BACKUP_CODE_PEPPER:-dev_backup_pepper_change_me}
      COOKIE_SIGNING_SECRET: ${COOKIE_SIGNING_SECRET:-dev_cookie_secret_change_me}
      MFA_MASTER_KEY: ${MFA_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: app-dev
      S3_FORCE_PATH_STYLE: "true"
      S3_USE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    expose:
      - "4000"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:4000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-dev-net

  frontend_prod:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${DEV_API_BASE_URL:-https://localhost:4000}
        VITE_APP_BASE_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
    profiles: [ "prodlike" ]
    expose:
      - "8080"
    depends_on:
      - backend_prod
    networks:
      - saas-dev-net

  frontend_admin_prod:
    build:
      context: ./frontends_admin
      dockerfile: Dockerfile.prod
      args:
        VITE_ADMIN_API_BASE_URL: ${DEV_API_BASE_URL:-https://localhost:4000}
        VITE_MAIN_APP_URL: ${DEV_APP_BASE_URL:-https://localhost:3000}
    profiles: [ "prodlike" ]
    expose:
      - "8080"
    depends_on:
      - backend_prod
    networks:
      - saas-dev-net

  nginx_prodlike:
    build:
      context: ./ops/nginx
      dockerfile: Dockerfile
    profiles: [ "prodlike" ]
    ports:
      - "${DEV_WEB_PORT:-3000}:3000"
      - "${DEV_ADMIN_PORT:-3002}:3002"
      - "${DEV_API_PORT:-4000}:4000"
    volumes:
      - ./ops/nginx/dev_prodlike.conf:/etc/nginx/nginx.conf:ro
      - ./ops/certs:/etc/nginx/certs:ro
    depends_on:
      frontend_prod:
        condition: service_started
      frontend_admin_prod:
        condition: service_started
      backend_prod:
        condition: service_healthy
    networks:
      - saas-dev-net

networks:
  saas-dev-net:
    driver: bridge

volumes:
  db-data:
  minio-data:
  redis-data:
