services:
  db:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saas-prod-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - redis-data:/data
    networks:
      - saas-prod-net

  redis-tls:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - saas-prod-net
    volumes:
      - ./ops/redis/stunnel.conf:/etc/stunnel/stunnel.conf:ro
      - ./ops/redis/certs:/etc/stunnel/certs:ro
    command: >
      sh -lc "apk add --no-cache stunnel && stunnel /etc/stunnel/stunnel.conf"

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env.prod
    environment:
      NODE_EXTRA_CA_CERTS: /etc/ssl/private/redis-ca.crt
      NODE_OPTIONS: --use-openssl-ca
    volumes:
      - ./ops/redis/certs/redis-ca.crt:/etc/ssl/private/redis-ca.crt:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:${PORT:-4000}/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - saas-prod-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend_worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env.prod
    environment:
      SERVICE_MODE: worker
      RUN_MIGRATIONS: "false"
      NODE_EXTRA_CA_CERTS: /etc/ssl/private/redis-ca.crt
      NODE_OPTIONS: --use-openssl-ca
    volumes:
      - ./ops/redis/certs/redis-ca.crt:/etc/ssl/private/redis-ca.crt:ro
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - saas-prod-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - saas-prod-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    image: ${ADMIN_IMAGE}
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - saas-prod-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: ${NGINX_IMAGE}
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-./ops/nginx/nginx.prod.conf}:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - saas-prod-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  saas-prod-net:
    driver: bridge

volumes:
  db-data:
  redis-data:
