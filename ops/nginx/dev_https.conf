worker_processes 1;

events {
  worker_connections 1024;
}

http {
  server {
    listen 3000 ssl;
    server_name localhost;

    ssl_certificate /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.crt;
    ssl_certificate_key /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.key;

    location / {
      proxy_pass http://127.0.0.1:5173;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  server {
    listen 4000 ssl;
    server_name localhost;

    ssl_certificate /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.crt;
    ssl_certificate_key /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.key;

    location / {
      proxy_pass http://127.0.0.1:4100;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
