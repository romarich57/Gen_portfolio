worker_processes 1;

events {
  worker_connections 1024;
}

http {
  # Frontend HTTPS (port 3000) -> localhost:5173
  server {
    listen 3000 ssl;
    server_name localhost;

    ssl_certificate /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.crt;
    ssl_certificate_key /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.key;

    # WebSocket support for Vite HMR
    location / {
      proxy_pass http://localhost:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # Backend HTTPS (port 4000) -> localhost:4000 (HTTP)
  server {
    listen 4000 ssl;
    server_name localhost;

    ssl_certificate /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.crt;
    ssl_certificate_key /Users/romarich/Desktop/Projet_perso/Saas_builder/ops/certs/localhost.key;

    location / {
      proxy_pass https://127.0.0.1:4100;
      proxy_ssl_verify off;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
