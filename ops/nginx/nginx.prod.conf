worker_processes auto;

events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # ACME + redirect HTTP->HTTPS
  server {
    listen 80;
    server_name saas-builder.romdev.cloud admin-builder.romdev.cloud api-builder.romdev.cloud;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # TLS common settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # PUBLIC APP
  server {
    listen 443 ssl;
    server_name saas-builder.romdev.cloud;

    ssl_certificate     /etc/letsencrypt/live/saas-builder.romdev.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saas-builder.romdev.cloud/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_pass http://frontend:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # ADMIN APP
  server {
    listen 443 ssl;
    server_name admin-builder.romdev.cloud;

    ssl_certificate     /etc/letsencrypt/live/saas-builder.romdev.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saas-builder.romdev.cloud/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_pass http://admin:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # API
  server {
    listen 443 ssl;
    server_name api-builder.romdev.cloud;

    ssl_certificate     /etc/letsencrypt/live/saas-builder.romdev.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saas-builder.romdev.cloud/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
      proxy_pass http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
