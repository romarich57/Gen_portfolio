# Nginx hardening snippet for Stripe webhook
# Adjust server_name and upstream to your environment.

limit_req_zone $binary_remote_addr zone=stripe_webhook_limit:10m rate=10r/m;

server {
  listen 443 ssl http2;
  server_name api.example.com;

  client_max_body_size 200k;
  client_body_timeout 10s;
  keepalive_timeout 15s;

  location /webhooks/stripe {
    limit_req zone=stripe_webhook_limit burst=5 nodelay;

    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }
}
